  var combosH=Object.entries(combo).map(function(e){return '<div class="combo-row"><div class="combo-label">'+esc(e[0])+'</div><div class="combo-pct">'+e[1]+'%</div><div class="combo-track"><div class="combo-fill" style="width:'+(e[1]/maxC*100)+'%"></div></div></div>';}).join('');
  var discSections=DISC_ORDER.map(function(key){
    var dkey=DISC_KEYS[key],meta=M[key],dd=D.disciplines&&D.disciplines[dkey];
    if(!meta) return '';
    var maxK=(dd&&dd.top_keywords&&dd.top_keywords.length)?dd.top_keywords[0].count:1;
    var bubb=(dd&&dd.top_keywords)?dd.top_keywords.map(function(kw){var sz=12+(kw.count/maxK)*3,op=0.5+(kw.count/maxK)*.5;return '<span class="bubble" style="font-size:'+sz+'px;border-color:'+meta.color+';color:'+meta.color+';opacity:'+op+'">'+esc(kw.word)+'</span>';}).join(''):'';
    var methH=(dd&&dd.methods)?Object.entries(dd.methods).sort(function(a,b){return b[1]-a[1];}).map(function(e,i){return bar(e[0],e[1],COLORS[i%COLORS.length]);}).join(''):'';
    var secLabel=function(txt){return '<div style="font-family:var(--ff-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin:24px 0 12px;padding-top:4px;border-top:1px solid var(--border)">'+txt+'</div>';};
    return '<div style="page-break-before:always;padding-top:8px">'+
      '<h2 style="font-family:var(--ff-display);font-size:26px;font-weight:400;letter-spacing:-.02em;color:var(--text);margin-bottom:4px">'+esc(meta.key)+
        '<span style="font-family:var(--ff-mono);font-size:12px;color:var(--text3);margin-left:14px;font-weight:400">'+(dd?dd.pct+'%':'')+'</span>'+
      '</h2>'+
      '<div style="font-size:12px;color:var(--text3);margin-bottom:24px">'+esc(D.snapshot_date||'')+'</div>'+
      secLabel('INTELLIGENCE BRIEF')+
      '<div class="callout callout-accent" style="margin-bottom:10px">'+meta.summary+'</div>'+
      '<div class="callout callout-green" style="margin-bottom:20px"><strong>Rigor benchmark.</strong> '+meta.rigor+'</div>'+
      secLabel('DATA SIGNALS')+
      '<div class="grid-2" style="margin-bottom:20px">'+
        '<div class="card"><div class="card-title">Methods in published papers</div>'+methH+'</div>'+
        '<div class="card"><div class="card-title">Top abstract keywords</div><div class="bubble-wrap">'+bubb+'</div></div>'+
      '</div>'+
      secLabel('UNEXPLORED TOPICS')+topics(meta.unexplored)+
      secLabel('TEAM SOPs')+sopBlock(key,meta.sop,true)+
      secLabel('NORTH STAR — LABS & INSTITUTIONS')+northStars(key,true)+
      secLabel('SAMPLE PUBLISHED PAPERS')+papers(dd&&dd.papers,true)+
    '</div>';
  }).join('');

  /* Inline CSS for the report window */
  var CSS='*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}'+
    ':root{--ff-display:"DM Serif Display",Georgia,serif;--ff-mono:"DM Mono","Courier New",monospace;--ff-body:"Outfit",system-ui,sans-serif}'+
    '[data-theme="dark"]{--bg:#111110;--surface:#1c1c1a;--surface2:#232320;--border:#2e2e2b;--border2:#3a3a36;--text:#e8e6e1;--text2:#9e9b93;--text3:#6b6860;--accent:#d4a96a;--accent-bg:rgba(212,169,106,.08);--accent-border:rgba(212,169,106,.22);--green:#6aad8e;--green-bg:rgba(106,173,142,.08);--green-border:rgba(106,173,142,.22);--red:#c0736a;--red-bg:rgba(192,115,106,.08);--red-border:rgba(192,115,106,.22);--blue:#7a9ec9;--blue-bg:rgba(122,158,201,.08);--blue-border:rgba(122,158,201,.22)}'+
    '[data-theme="light"]{--bg:#faf9f7;--surface:#fff;--surface2:#f0ede8;--border:#e2ded8;--border2:#ccc8c0;--text:#1c1b18;--text2:#6b6860;--text3:#9e9b93;--accent:#9a6f34;--accent-bg:rgba(154,111,52,.07);--accent-border:rgba(154,111,52,.22);--green:#3a7a5c;--green-bg:rgba(58,122,92,.07);--green-border:rgba(58,122,92,.22);--red:#8f3d36;--red-bg:rgba(143,61,54,.07);--red-border:rgba(143,61,54,.22);--blue:#3a6494;--blue-bg:rgba(58,100,148,.07);--blue-border:rgba(58,100,148,.22)}'+
    'body{background:var(--bg);color:var(--text);font-family:var(--ff-body);font-size:14px;line-height:1.7;-webkit-font-smoothing:antialiased;padding:48px 56px}'+
    '.callout{border-radius:6px;padding:16px 20px;font-size:14px;line-height:1.75;margin-bottom:14px;border:1px solid}.callout strong{font-weight:600}'+
    '.callout-accent{background:var(--accent-bg);border-color:var(--accent-border)}.callout-accent strong{color:var(--accent)}'+
    '.callout-green{background:var(--green-bg);border-color:var(--green-border)}.callout-green strong{color:var(--green)}'+
    '.callout-red{background:var(--red-bg);border-color:var(--red-border)}.callout-red strong{color:var(--red)}'+
    '.callout-blue{background:var(--blue-bg);border-color:var(--blue-border)}.callout-blue strong{color:var(--blue)}'+
    '.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}'+
    '.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}'+
    '.card-title{font-family:var(--ff-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}'+
    '.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}'+
    '.bar-label{font-size:13px;color:var(--text2);min-width:155px;max-width:155px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}'+
    '.bar-label.wide{min-width:205px;max-width:205px}'+
    '.bar-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}'+
    '.bar-fill{height:100%;border-radius:2px}.bar-val{font-family:var(--ff-mono);font-size:11px;color:var(--text3);min-width:34px;text-align:right}'+
    '.bubble-wrap{display:flex;flex-wrap:wrap;gap:8px}.bubble{padding:4px 11px;border-radius:20px;font-family:var(--ff-mono);font-size:11px;border:1px solid var(--border);color:var(--text3)}'+
    '.topic-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}'+
    '.topic-chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px}'+
    '.topic-chip .t-title{font-size:13.5px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:6px}.topic-chip .t-why{font-size:12px;color:var(--text3);line-height:1.55;font-style:italic}'+
    '.ns-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}'+
    '.ns-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:12px}'+
    '.ns-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.4}.ns-focus{font-size:12px;color:var(--text3);font-style:italic;line-height:1.5}'+
    '.ns-divider{height:1px;background:var(--border)}.ns-why{font-size:13px;color:var(--text2);line-height:1.65}'+
    '.ns-link{font-family:var(--ff-mono);font-size:11px;color:var(--accent);word-break:break-all;margin-top:4px}'+
    '.papers-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}'+
    '.paper-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:8px}'+
    '.paper-title{font-size:13.5px;font-weight:500;color:var(--text);line-height:1.45}.paper-affil{font-size:12px;color:var(--text3);font-style:italic}'+
    '.paper-abstract{font-size:12.5px;color:var(--text2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}'+
    '.paper-link{font-family:var(--ff-mono);font-size:11px;color:var(--accent);word-break:break-all;margin-top:4px}'+
    '.combo-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}.combo-label{font-size:13px;color:var(--text2);min-width:205px}'+
    '.combo-pct{font-family:var(--ff-mono);font-size:12px;color:var(--accent);min-width:36px;text-align:right}'+
    '.combo-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}.combo-fill{height:100%;background:var(--accent);opacity:.5;border-radius:2px}'+
    '.sop-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}'+
    '.sop-list{list-style:none;counter-reset:sop-c}'+
    '.sop-list li{counter-increment:sop-c;position:relative;padding:12px 16px 12px 46px;margin-bottom:8px;border-radius:6px;background:var(--surface2);font-size:13.5px;color:var(--text2);line-height:1.65}'+
    '.sop-list li::before{content:counter(sop-c);position:absolute;left:14px;top:50%;transform:translateY(-50%);width:19px;height:19px;background:var(--border2);color:var(--text3);border-radius:50%;font-family:var(--ff-mono);font-size:10px;display:flex;align-items:center;justify-content:center}'+
    '.sop-list li strong{color:var(--text);font-weight:600}'+
    '.sop-gonogo .sop-list li.go{background:var(--green-bg);border:1px solid var(--green-border)}'+
    '.sop-gonogo .sop-list li.go::before{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);content:"GO";font-size:8px;letter-spacing:.04em}'+
    '.sop-gonogo .sop-list li.nogo{background:var(--red-bg);border:1px solid var(--red-border)}'+
    '.sop-gonogo .sop-list li.nogo::before{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);content:"NO";font-size:8px}'+
    '@media print{body{padding:32px 40px}@page{margin:20mm}}';

  return '<!DOCTYPE html><html lang="en" data-theme="'+theme+'"><head>'+
    '<meta charset="UTF-8"><title>Research Intelligence Report</title>'+
    '<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">'+
    '<style>'+CSS+'</style></head><body>'+
    /* Cover */
    '<div style="padding:60px 0 48px;border-bottom:1px solid var(--border);margin-bottom:48px">'+
      '<h1 style="font-family:var(--ff-display);font-size:40px;font-weight:400;letter-spacing:-.02em;color:var(--text);margin-bottom:10px">Research Intelligence Report</h1>'+
      '<div style="font-family:var(--ff-mono);font-size:13px;color:var(--text3);letter-spacing:.04em">'+
        esc(D.snapshot_label||'')+'&nbsp;&nbsp;/&nbsp;&nbsp;'+esc(D.snapshot_date||'')+'&nbsp;&nbsp;/&nbsp;&nbsp;Generated '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+
      '</div></div>'+
    /* Overview */
    '<h2 style="font-family:var(--ff-display);font-size:26px;font-weight:400;letter-spacing:-.02em;color:var(--text);margin-bottom:24px">Publication Overview</h2>'+
    '<div class="grid-2" style="margin-bottom:20px">'+
      '<div class="card"><div class="card-title">Discipline distribution</div>'+discBarsH+'</div>'+
      '<div class="card"><div class="card-title">Methodology trends</div>'+methBarsH+'</div>'+
    '</div>'+
    '<div class="card" style="margin-bottom:20px"><div class="card-title">Interdisciplinary combinations</div><div style="columns:2;column-gap:32px">'+combosH+'</div></div>'+
    '<div class="callout callout-accent" style="margin-bottom:10px"><strong>The #1 signal.</strong> AI/ML combined with Biomedical accounts for 25% of all cross-disciplinary published work. The bar is rising — reviewers now expect ablation studies, held-out test sets, and non-trivial datasets.</div>'+
    '<div class="callout callout-green" style="margin-bottom:10px"><strong>Biggest opportunity gaps.</strong> Physics and Engineering, Computer Science, and Neuroscience are nearly empty in published HS research. A motivated student with rigorous methodology faces almost zero competition.</div>'+
    '<div class="callout callout-blue" style="margin-bottom:10px"><strong>The mathematics pathway.</strong> Over 85% of serious mathematics papers involve formal proof-based work with university co-authorship.</div>'+
    '<div class="callout callout-red"><strong>The discipline gap.</strong> Social Sciences and Economics are heavily written about but underrepresented in serious publications. Fix: require statistical analysis before any writing begins.</div>'+
    discSections+
    '</body></html>';
}

function generateReport(){
  var html=buildReportHTML();
  var blob=new Blob([html],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var win=window.open(url,'_blank');
  if(win){
    win.onload=function(){win.focus();win.print();};
  } else {
    var a=document.createElement('a');
    a.href=url; a.download='research-intelligence-report.html';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
}

/* ── OVERVIEW ── */
function renderOverview(){
  var disc=D.disc_pct||{},meth=D.methods_pct||{},combo=D.interdis_combos_pct||{};
  var maxC=Math.max.apply(null,Object.values(combo).concat([1]));
  var discBars=Object.entries(disc).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];}).map(function(e,i){return bar(e[0],e[1],COLORS[i%COLORS.length],true);}).join('');
  var methBars=Object.entries(meth).sort(function(a,b){return b[1]-a[1];}).map(function(e,i){return bar(e[0],e[1],COLORS[(i+4)%COLORS.length],true);}).join('');
  var combos=Object.entries(combo).map(function(e){return '<div class="combo-row"><div class="combo-label">'+esc(e[0])+'</div><div class="combo-pct">'+e[1]+'%</div><div class="combo-track"><div class="combo-fill" style="width:'+(e[1]/maxC*100)+'%"></div></div></div>';}).join('');
  return '<div class="page-title">Overview<span class="title-meta">'+(D.snapshot_date||'')+'</span></div>'+
    '<div class="page-sub">Publication trends across high school research journals</div>'+
    '<div class="section-label">Discipline Distribution</div>'+
    '<div class="grid-2 mb-5"><div class="card"><div class="card-title">Share of publications</div>'+discBars+'</div><div class="card"><div class="card-title">Methodology trends</div>'+methBars+'</div></div>'+
    '<div class="section-label">Interdisciplinary Combinations</div>'+
    '<div class="card mb-6"><div style="columns:2;column-gap:32px">'+combos+'</div></div>'+
    '<div class="section-label">Strategic Intelligence</div>'+
    '<div class="callout callout-accent mb-5"><strong>The #1 signal.</strong> AI/ML combined with Biomedical accounts for 25% of all cross-disciplinary published work. Reviewers now expect ablation studies, held-out test sets, and non-trivial datasets.</div>'+
    '<div class="callout callout-green mb-5"><strong>Biggest opportunity gaps.</strong> Physics and Engineering, Computer Science, and Neuroscience are nearly empty in published HS research. A motivated student with rigorous methodology faces almost zero competition.</div>'+
    '<div class="callout callout-blue mb-5"><strong>The mathematics pathway.</strong> Over 85% of serious mathematics papers involve formal proof-based work with university co-authorship — the clearest pipeline, but requires early commitment.</div>'+
    '<div class="callout callout-red"><strong>The discipline gap.</strong> Social Sciences and Economics are heavily written about but underrepresented in serious publications. Fix: require statistical analysis before any writing begins.</div>';
}

/* ── DISCIPLINE ── */
function renderDisc(key){
  var dkey=DISC_KEYS[key],meta=M[key],dd=D.disciplines&&D.disciplines[dkey];
  if(!meta) return '<p style="color:var(--text3)">Section not found.</p>';
  var maxK=(dd&&dd.top_keywords&&dd.top_keywords.length)?dd.top_keywords[0].count:1;
  var bubb=(dd&&dd.top_keywords)?dd.top_keywords.map(function(kw){var sz=12+(kw.count/maxK)*3,op=0.5+(kw.count/maxK)*.5;return '<span class="bubble" style="font-size:'+sz+'px;border-color:'+meta.color+';color:'+meta.color+';opacity:'+op+'">'+esc(kw.word)+'</span>';}).join(''):'';
  var methH=(dd&&dd.methods)?Object.entries(dd.methods).sort(function(a,b){return b[1]-a[1];}).map(function(e,i){return bar(e[0],e[1],COLORS[i%COLORS.length]);}).join(''):'';
  var pctStr=dd?(dd.pct+'% of publications'):'No data in snapshot';
  return '<div class="page-title">'+esc(meta.key)+'<span class="title-meta">'+pctStr+'</span></div>'+
    '<div class="page-sub">'+(D.snapshot_date||'Latest snapshot')+'</div>'+
    '<div class="section-label">Intelligence Brief</div>'+
    '<div class="callout callout-accent mb-5">'+meta.summary+'</div>'+
    '<div class="callout callout-green mb-6"><strong>Rigor benchmark.</strong> '+meta.rigor+'</div>'+
    '<div class="section-label">Data Signals</div>'+
    '<div class="grid-21 mb-6">'+
      '<div class="grid-2" style="margin:0">'+
        '<div class="card"><div class="card-title">Methods in published papers</div>'+methH+'</div>'+
        '<div class="card"><div class="card-title">Top abstract keywords</div><div class="bubble-wrap">'+bubb+'</div></div>'+
      '</div>'+
      '<div class="card" style="align-self:start"><div class="card-title">Unexplored topics</div>'+topics(meta.unexplored)+'</div>'+
    '</div>'+
    '<div class="section-label">Team SOPs — Ideation to Submission</div>'+
    sopBlock(key,meta.sop,false)+
    '<div class="section-label">North Star — Labs and Institutions</div>'+
    '<div class="callout callout-blue mb-5" style="font-size:13px">These institutions are doing compelling work adjacent to this discipline. Use their open research and methodologies as inspiration and potential collaboration targets.</div>'+
    northStars(key,false)+
    '<div class="section-label">Sample Published Papers</div>'+
    papers(dd&&dd.papers,false);
}

/* ── HISTORY ── */
function renderHistory(){
  var activeIdx=getActiveIdx();
  var cards=SNAPSHOTS.map(function(snap,i){
    var isActive=(i===activeIdx);
    var top5=Object.entries(snap.disc_pct||{}).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
    var maxPct=top5.length?top5[0][1]:1;
    var miniBars=top5.map(function(e,j){
      return '<div class="hist-mini">'+
        '<div class="hist-mini-lbl">'+esc(e[0].split(' ')[0])+'</div>'+
        '<div class="hist-mini-track"><div class="hist-mini-fill" style="width:'+(e[1]/maxPct*100)+'%;background:'+COLORS[j%COLORS.length]+'"></div></div>'+
        '<div class="hist-mini-val">'+e[1]+'%</div></div>';
    }).join('');
    var added=snap.added_at?new Date(snap.added_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'--';
    var loadBtn=isActive?''
      :'<div style="margin-top:12px"><button class="btn" style="font-size:12px" onclick="event.stopPropagation();switchSnapshot('+i+')">View this snapshot</button></div>';
    return '<div class="hist-card'+(isActive?' active-snap':'')+'" onclick="switchSnapshot('+i+')">'+
      '<div class="hist-snap-label">'+(isActive?'ACTIVE':'SNAPSHOT '+(i+1))+'</div>'+
      '<div class="hist-title">'+esc(snap.snapshot_label||('Snapshot '+(i+1)))+'</div>'+
      '<div class="hist-meta">'+esc(snap.snapshot_date||'--')+'&nbsp;&middot;&nbsp;Added '+added+'</div>'+
      miniBars+loadBtn+'</div>';
  }).join('');
  return '<div class="page-title">History</div>'+
    '<div class="page-sub">Compare how publication trends shift across time periods</div>'+
    '<div class="section-label">All Snapshots</div>'+
    '<div class="hist-grid">'+cards+'</div>'+
    '<div class="callout callout-blue" style="font-size:13px">New snapshots are added by the research team when fresh journal data is available. Each snapshot covers a 6-month publication window.</div>';
}

function switchSnapshot(idx){
  setActiveIdx(idx);
  D=SNAPSHOTS[idx];
  updateSidebar();
  go('history');
}

/* ── ROUTING ── */
var SECTIONS={
  overview:renderOverview, history:renderHistory,
  ai:function(){return renderDisc('ai');},    bio:function(){return renderDisc('bio');},
  env:function(){return renderDisc('env');},  soc:function(){return renderDisc('soc');},
  econ:function(){return renderDisc('econ');},math:function(){return renderDisc('math');},
  hum:function(){return renderDisc('hum');},  neuro:function(){return renderDisc('neuro');},
  chem:function(){return renderDisc('chem');},cs:function(){return renderDisc('cs');},
  phys:function(){return renderDisc('phys');}
};
function go(key){
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('active',el.dataset.s===key);});
  var m=document.getElementById('main');
  m.innerHTML=SECTIONS[key]?SECTIONS[key]():'<p style="color:var(--text3)">Not found.</p>';
  var s=document.getElementById('main-scroll');if(s)s.scrollTop=0;
}
function toggleTheme(){
  var h=document.documentElement,d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('theme-btn').textContent=d?'Dark':'Light';
}
updateSidebar();
go('overview');
</script>
</body>
