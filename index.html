<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Research Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ff-display:'DM Serif Display',Georgia,serif;--ff-mono:'DM Mono','Courier New',monospace;--ff-body:'Outfit',system-ui,sans-serif}
:root[data-theme="dark"]{--bg:#111110;--bg-raised:#161615;--surface:#1c1c1a;--surface2:#232320;--border:#2e2e2b;--border2:#3a3a36;--text:#e8e6e1;--text2:#9e9b93;--text3:#6b6860;--accent:#d4a96a;--accent-bg:rgba(212,169,106,.08);--accent-border:rgba(212,169,106,.22);--green:#6aad8e;--green-bg:rgba(106,173,142,.08);--green-border:rgba(106,173,142,.22);--red:#c0736a;--red-bg:rgba(192,115,106,.08);--red-border:rgba(192,115,106,.22);--blue:#7a9ec9;--blue-bg:rgba(122,158,201,.08);--blue-border:rgba(122,158,201,.22)}
:root[data-theme="light"]{--bg:#faf9f7;--bg-raised:#f5f3ef;--surface:#ffffff;--surface2:#f0ede8;--border:#e2ded8;--border2:#ccc8c0;--text:#1c1b18;--text2:#6b6860;--text3:#9e9b93;--accent:#9a6f34;--accent-bg:rgba(154,111,52,.07);--accent-border:rgba(154,111,52,.22);--green:#3a7a5c;--green-bg:rgba(58,122,92,.07);--green-border:rgba(58,122,92,.22);--red:#8f3d36;--red-bg:rgba(143,61,54,.07);--red-border:rgba(143,61,54,.22);--blue:#3a6494;--blue-bg:rgba(58,100,148,.07);--blue-border:rgba(58,100,148,.22)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--ff-body);font-size:15px;font-weight:400;line-height:1.7;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:var(--bg-raised);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:54px}
.hdr-brand{display:flex;align-items:baseline;gap:12px}
.hdr-brand h1{font-family:var(--ff-display);font-size:20px;font-weight:400;letter-spacing:-.02em;color:var(--text)}
.hdr-brand .divider{color:var(--border2);font-weight:300}
.hdr-brand .snap-label{font-family:var(--ff-mono);font-size:11px;color:var(--text3);letter-spacing:.04em}
.hdr-controls{display:flex;align-items:center;gap:8px}
.hdr-badge{font-family:var(--ff-mono);font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 8px;letter-spacing:.04em}
.btn{display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-family:var(--ff-body);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:border-color .15s,color .15s;white-space:nowrap}
.btn:hover{border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.btn-primary:hover{border-color:var(--accent)}
/* LAYOUT */
.shell{display:flex;height:calc(100vh - 54px)}
/* SIDEBAR */
.sidebar{width:224px;min-width:224px;background:var(--bg-raised);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:16px 0 0}
.sb-section{font-family:var(--ff-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:16px 20px 6px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;font-size:13.5px;font-weight:400;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text);border-left-color:var(--border2)}
.nav-item.active{background:var(--surface2);color:var(--text);border-left-color:var(--accent);font-weight:500}
.nav-item .nav-pct{font-family:var(--ff-mono);font-size:11px;color:var(--text3);flex-shrink:0}
.nav-item.active .nav-pct{color:var(--accent)}
/* MAIN */
.main{flex:1;overflow-y:auto}
.main-inner{padding:44px 48px;max-width:1120px}
/* TYPE */
.page-title{font-family:var(--ff-display);font-size:30px;font-weight:400;letter-spacing:-.02em;color:var(--text);line-height:1.2;margin-bottom:4px;display:flex;align-items:baseline;gap:16px}
.page-title .title-meta{font-family:var(--ff-mono);font-size:12px;font-weight:400;color:var(--text3);letter-spacing:.04em}
.page-sub{font-size:14px;color:var(--text3);margin-bottom:36px;font-weight:300}
.section-label{font-family:var(--ff-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:12px;padding-top:28px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
/* CALLOUTS */
.callout{border-radius:6px;padding:16px 20px;font-size:14px;line-height:1.75;margin-bottom:14px;border:1px solid}
.callout strong{font-weight:600}
.callout-accent{background:var(--accent-bg);border-color:var(--accent-border)}.callout-accent strong{color:var(--accent)}
.callout-green{background:var(--green-bg);border-color:var(--green-border)}.callout-green strong{color:var(--green)}
.callout-red{background:var(--red-bg);border-color:var(--red-border)}.callout-red strong{color:var(--red)}
.callout-blue{background:var(--blue-bg);border-color:var(--blue-border)}.callout-blue strong{color:var(--blue)}
/* GRIDS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.grid-21{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:20px}
.mb-5{margin-bottom:20px}.mb-6{margin-bottom:24px}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
.card-title{font-family:var(--ff-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
/* BAR */
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-label{font-size:13px;color:var(--text2);min-width:155px;max-width:155px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-label.wide{min-width:205px;max-width:205px}
.bar-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.bar-val{font-family:var(--ff-mono);font-size:11px;color:var(--text3);min-width:34px;text-align:right}
/* BUBBLES */
.bubble-wrap{display:flex;flex-wrap:wrap;gap:8px}
.bubble{padding:4px 11px;border-radius:20px;font-family:var(--ff-mono);font-size:11px;border:1px solid var(--border);color:var(--text3);background:transparent;cursor:default;transition:border-color .12s,color .12s}
.bubble:hover{border-color:var(--border2);color:var(--text2)}
/* TOPICS */
.topic-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.topic-chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px}
.topic-chip .t-title{font-size:13.5px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:6px}
.topic-chip .t-why{font-size:12px;color:var(--text3);line-height:1.55;font-style:italic}
/* NORTH STAR */
.ns-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.ns-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:12px}
.ns-card:hover{border-color:var(--border2)}
.ns-name{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.4}
.ns-focus{font-size:12px;color:var(--text3);font-style:italic;line-height:1.5}
.ns-divider{height:1px;background:var(--border);flex-shrink:0}
.ns-why{font-size:13px;color:var(--text2);line-height:1.65}
.ns-link{font-family:var(--ff-mono);font-size:12px;color:var(--accent);text-decoration:none;margin-top:auto;display:inline-block}
.ns-link:hover{text-decoration:underline}
/* SOP */
.sop-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px}
.sop-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.sop-tab{padding:11px 20px;font-family:var(--ff-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .12s,border-color .12s;white-space:nowrap}
.sop-tab:hover{color:var(--text2)}
.sop-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.sop-panels{background:var(--surface)}
.sop-panel{display:none;padding:20px}
.sop-panel.active{display:block}
.sop-list{list-style:none;counter-reset:sop-c}
.sop-list li{counter-increment:sop-c;position:relative;padding:12px 16px 12px 46px;margin-bottom:8px;border-radius:6px;background:var(--surface2);font-size:13.5px;color:var(--text2);line-height:1.65}
.sop-list li::before{content:counter(sop-c);position:absolute;left:14px;top:50%;transform:translateY(-50%);width:19px;height:19px;background:var(--border2);color:var(--text3);border-radius:50%;font-family:var(--ff-mono);font-size:10px;display:flex;align-items:center;justify-content:center}
.sop-list li strong{color:var(--text);font-weight:600}
.sop-gonogo .sop-list li.go{background:var(--green-bg);border:1px solid var(--green-border)}
.sop-gonogo .sop-list li.go::before{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green);content:'GO';font-size:8px;letter-spacing:.04em}
.sop-gonogo .sop-list li.nogo{background:var(--red-bg);border:1px solid var(--red-border)}
.sop-gonogo .sop-list li.nogo::before{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);content:'NO';font-size:8px}
/* PAPERS */
.papers-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.paper-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}
.paper-card:hover{border-color:var(--border2)}
.paper-title{font-size:13.5px;font-weight:500;color:var(--text);line-height:1.45}
.paper-affil{font-size:12px;color:var(--text3);font-style:italic}
.paper-abstract{font-size:12.5px;color:var(--text2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.paper-link{font-family:var(--ff-mono);font-size:12px;color:var(--accent);text-decoration:none;margin-top:4px;word-break:break-all}
.paper-link:hover{text-decoration:underline}
/* COMBO */
.combo-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.combo-label{font-size:13px;color:var(--text2);min-width:205px}
.combo-pct{font-family:var(--ff-mono);font-size:12px;color:var(--accent);min-width:36px;text-align:right}
.combo-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.combo-fill{height:100%;background:var(--accent);opacity:.5;border-radius:2px}
/* HISTORY */
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:20px}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:border-color .15s}
.hist-card:hover{border-color:var(--border2)}
.hist-card.active-snap{border-color:var(--accent)}
.hist-snap-label{font-family:var(--ff-mono);font-size:10px;letter-spacing:.08em;color:var(--text3);margin-bottom:8px}
.hist-card.active-snap .hist-snap-label{color:var(--accent)}
.hist-title{font-family:var(--ff-display);font-size:17px;color:var(--text);margin-bottom:4px;line-height:1.3}
.hist-meta{font-size:12px;color:var(--text3);margin-bottom:16px}
.hist-mini{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hist-mini-lbl{font-size:12px;color:var(--text2);min-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-mini-track{flex:1;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.hist-mini-fill{height:100%;border-radius:1px}
.hist-mini-val{font-family:var(--ff-mono);font-size:10px;color:var(--text3);min-width:28px;text-align:right}
body,.sidebar,.hdr{transition:background .2s,color .2s}
</style>
</head>

mean field game, in which the players face a penalization equal to the population density at their final position. We consider the problem of finding an equilibrium when the initial distribution is a discrete measure. We show that the problem becomes finite-dimensional: the final piecewise smooth density is completel...", "link": "https://msp.org/involve/2026/19-1/p07.xhtml", "date": "2026-01-25", "affiliation": "Baylor University (United States)"}, {"title": "Intersection games and Bernstein sets", "source": "MSP Involve", "abstract": "The Banach-Mazur game, Schmidt's game and McMullen's absolute winning game are three quintessential intersection games. We investigate their determinacy on the real line when the target set for either player is a Bernstein set, a non-Lebesgue measurable set whose construction depends on the axiom of choice.", "link": "https://msp.org/involve/2025/18-5/p05.xhtml", "date": "2025-11-20", "affiliation": "University of North Texas (United States)"}, {"title": "Assessing the Possibility and Feasibility of Predicting Major US Financial Bubbles Using Deep Learning, LLM, and DL-LLM Architectures Analyzing Macro-Financial Data", "source": "NHSJS", "abstract": "Predicting financial bubbles is essential for preventing market disruptions and economic losses, encouraging the development of various technical approaches for detection. As of July 2025, Deep Learning (DL) models have become the dominant approach for such financial prediction, while LLM research remains limited to basic tasks such as text summarization and question-answering. This paper builds o...", "link": "https://nhsjs.com/2025/assessing-the-possibility-and-feasibility-of-predicting-major-us-financial-bubbles-using-deep-learning-llm-and-dl-llm-architectures-analyzing-macro-financial-data/", "date": "2025-10-23", "affiliation": ""}]}, "Computer Science & Software": {"pct": 0.6, "top_keywords": [{"word": "encryption", "count": 13}, {"word": "algorithms", "count": 5}, {"word": "decryp g an inner wall—combustors are emerging as a promising alternative due to their po...", "link": "https://nhsjs.com/2026/comparative-performance-analysis-of-hollow-and-annular-combustors-in-rotating-detonation-engines/", "date": "2026-02-04", "affiliation": ""}]}}, "snapshot_date": "Aug 2025 – Mar 2026", "snapshot_label": "Snapshot 1 — Baseline", "added_at": "2026-03-15T00:00:00.000Z"}]</script>
<script type="application/json" id="d-meta">{"ai": {"key": "AI & Machine Learning", "color": "#8b7cf8", "emoji": "🤖", "summary": "AI & ML is the 2nd-largest discipline in serious published HS research at 22%. The bar is rising fast — reviewers now expect ablation studies, held-out test sets, and non-trivial datasets. Audio/sound classification is a surprisingly strong emerging niche. Generic \"I trained a model\" papers are rejected.", "rigor": "Published papers show: accuracy tables with precision/recall/F1, comparison against at least one baseline model, train/val/test splits explicitly stated, and a real-world application domain that is clearly motivated. Reviewers expect a limitations section and future work.", "unexplored": [{"t": "Federated learning for privacy-sensitive health data", "w": "No HS paper yet despite massive clinical relevance"}, {"t": "ML bias auditing on hiring or lending algorithms", "w": "Policy + tech combo — strong fit for serious HS research journals"}, {"t": "Multimodal AI for rare disease diagnosis", "w": "Rare diseases = less competition, more novelty"}, {"t": "AI for low-resource language NLP", "w": "Massive gap — nearly all HS papers use English-only datasets"}, {"t": "Reinforcement learning for traffic signal optimisation", "w": "RL is almost entirely absent from HS journals"}, {"t": "AI hallucination detection in student-facing educational tools", "w": "Timely, no published HS treatment exists yet"}], "sop": {"first_meeting": ["Ask the student to name ONE real-world problem they want to solve — not a technique they want to use. Redirect if they lead with 'I want to train a neural network.'", "Identify what data they have access to or can realistically obtain within 2 weeks. No data = no paper. Check Kaggle, PhysioNet, UCI ML Repository, and government datasets together in the meeting.", "Assess Python/ML proficiency: can they run a scikit-learn pipeline end-to-end? If not, set a 2-week onboarding task before ideating further.", "Scope the problem to a single, binary or multi-class prediction task. One input type, one output type. Complexity can grow later.", "Assign: read 3 recently published papers in this discipline (Google Scholar or arXiv) and return with notes on how each frames its evaluation section."], "thirty_day": ["Dataset should be loaded, cleaned, and split into train/val/test. If not, flag immediately — this is the most common bottleneck.", "At least one baseline model (logistic regression or random forest) should be trained and producing results. No baseline = no publishable comparison.", "Student should be able to state their research question in one sentence ending in '...using [dataset] and [method].'", "Check that the test set has NOT been touched yet. Early test set leakage is the most common methodological flaw in HS ML papers.", "Review the literature section: minimum 5 cited papers from real journals, not Wikipedia or Medium articles."], "go_nogo": ["GO: Student has a held-out test set, a trained baseline, a non-trivial dataset (>500 samples, not MNIST), and a clearly motivated application domain.", "GO: Research question is falsifiable — the paper will either confirm or deny a specific hypothesis about model performance.", "NO-GO: Model is trained only on a training set with no separate test evaluation. This is not fixable at review stage.", "NO-GO: The 'novelty' is only that the student applied an existing model to a slightly different dataset with no new insight.", "NO-GO: Student cannot explain why their chosen model is appropriate for the task — signals lack of methodological understanding."]}}, "bio": {"key": "Biomedical & Health Sciences", "color": "#f87171", "emoji": "🧬", "summary": "The largest discipline at 33.5% of serious published HS research. The bar is the highest here. Pure literature reviews almost never get accepted. Students need either original data, a computational analysis of published databases (TCGA, GEO, PDB), or a clear clinical translation angle with institutional mentorship.", "rigor": "Published biomedical papers have: controlled experiments with replicate measurements, or computational analysis using established databases (TCGA, GEO, PDB, AlphaFold), an institutional mentor, and PICO-framed research questions. Strong data analyses require a dedicated limitations section.", "unexplored": [{"t": "Long COVID cognitive effects in adolescents", "w": "Emerging, data-available, severely underresearched in teen populations"}, {"t": "Microbiome diversity in local South Asian population cohorts", "w": "Regional microbiome data papers are nearly absent from HS literature"}, {"t": "mRNA vaccine immunogenicity comparison in non-Western populations", "w": "Equity angle plus clear clinical relevance — open data available"}, {"t": "Wearable sensor data for early cardiac arrhythmia detection", "w": "Consumer device data plus ML plus clinical framing — no HS paper yet"}, {"t": "Social media use and disordered eating in South Asian teenagers", "w": "Culturally specific, under-studied population, survey study accessible"}, {"t": "AI-assisted diagnosis of neglected tropical diseases", "w": "Global health equity framing, image datasets available from WHO"}], "sop": {"first_meeting": ["Determine access before any ideation: wet lab, clinical collaborator, or computational database? These are three completely different project types. Do not let the student ideate without knowing their access tier.", "For computational track: open TCGA, GEO, and STRING together and show the student how to search for a gene or pathway. The project idea often comes from exploring the data, not the other way around.", "For lab track: identify the specific school or university lab and confirm access in writing before committing to a topic. Verbal promises from faculty collapse more often than not.", "Ask the student to frame their question using PICO: Population, Intervention/Exposure, Comparison, Outcome. If they cannot fill in all four fields, the question is not scoped enough.", "Assign: read the methods section of 2 recently published HS-level biomedical papers and list every tool, database, and statistical test used."], "thirty_day": ["Computational track: student should have downloaded their dataset (TCGA/GEO), completed quality filtering, and produced at least one preliminary visualisation (expression heatmap, survival curve, or PCA plot).", "Lab track: experimental protocol should be finalised, approved by the lab mentor, and at least one pilot run completed. No pilot = project is at risk.", "Literature review: minimum 8 cited peer-reviewed sources. Check that at least 3 are from the last 3 years — recency signals are important to reviewers.", "Mentor relationship confirmed: the faculty mentor should have reviewed the research question and provided written feedback. If they have gone silent, escalate now.", "Research question should be specific enough that the student can describe the expected result in a single sentence."], "go_nogo": ["GO: Computational — student has a specific gene/pathway/biomarker target, a downloaded dataset from a recognised source, and a mentor with relevant domain expertise.", "GO: Experimental — lab access confirmed, protocol approved, controls defined, statistical test pre-specified.", "NO-GO: Topic is 'cancer' or 'COVID' without a specific molecular or population angle. Too broad to be publishable.", "NO-GO: No mentor with institutional affiliation. Serious HS research journals require this — do not proceed without one.", "NO-GO: Proposed study design has no control group or comparison condition. This is a fatal methodological flaw."]}}, "env": {"key": "Environmental & Climate Science", "color": "#42e8b0", "emoji": "🌿", "summary": "Environmental science is 7.9% of serious published HS research. A distinctive methodological signature: GIS and geospatial analysis appears in 25% of published papers — students who use QGIS or Google Earth Engine have a clear edge. Lab-based environmental chemistry (biopolymers, catalysts, water testing) is the other strong track.", "rigor": "Published papers combine: (1) specific geographic or policy context, (2) actual collected or satellite data, (3) statistical regression or spatial analysis. Generic overview reviews never get published. Satellite and GIS-based environmental studies with precise geographic scope set the quality benchmark.", "unexplored": [{"t": "Air quality index vs. asthma hospitalisation rates by district in Indian cities", "w": "Local data from CPCB, policy relevance, no HS paper exists"}, {"t": "Noise pollution mapping in urban schools using low-cost IoT sensors", "w": "Accessible experiment, education and health equity framing"}, {"t": "Microplastic concentrations in local tap water or river samples", "w": "Lab accessible with basic equipment, community-relevant topic"}, {"t": "Tree canopy cover and urban heat island intensity in South Asian megacities", "w": "Satellite data plus GIS — cities like Delhi, Mumbai underrepresented"}, {"t": "Carbon footprint of AI model training at university computing centres", "w": "Novel cross-disciplinary angle — environmental plus computer science"}, {"t": "Freshwater stress projections under CMIP6 climate scenarios for specific river basins", "w": "Hydrological modelling with open climate data, geography-specific"}], "sop": {"first_meeting": ["Ground the study in a named geography immediately. Ask: 'Which city, district, or watershed?' A geographically specific question is 80% of the way to a publishable abstract.", "Identify the data source before the method. Show the student NASA Earthdata, NOAA, EPA, India CPCB, and WHO ambient air databases. The dataset should be downloadable within the same week.", "For GIS-based projects: assess whether the student has used QGIS or Google Earth Engine before. If not, assign a 1-week tutorial (QGIS has free online courses) before proceeding.", "For lab-based environmental chemistry: confirm lab access and identify the specific analyte being measured (PFAS, nitrates, heavy metals, microplastics). Vague 'water quality' projects fail at scoping.", "Assign: find one published HS-level environmental paper that uses a similar dataset or method and bring a summary of its methodology to the next meeting."], "thirty_day": ["Data should be downloaded, formatted, and exploratory analysis started. At minimum: a map or time-series plot showing the core variable of interest.", "For GIS papers: shapefile boundaries loaded, satellite or sensor data overlaid, at least one spatial correlation computed.", "For lab papers: sample collection plan finalised and at least 3 pilot measurements completed. Instrument calibration documented.", "Policy connection articulated: student should be able to name a specific government body, regulation, or intervention their findings speak to.", "Literature review should include at least 2 papers using the same dataset or geographic region — this is how reviewers assess situatedness."], "go_nogo": ["GO: Specific geography named, data source confirmed and accessible, clear environmental variable being measured or modelled.", "GO: Student can explain what their map or regression will show and who would care about the result.", "NO-GO: Topic is 'climate change is happening' without a specific measurable angle — this is an opinion piece, not a research paper.", "NO-GO: Satellite data selected but student has no plan for spatial analysis — downloading data without an analytical method is not a project.", "NO-GO: Lab-based study proposed but no confirmed lab access or instrument availability. Do not proceed without written confirmation."]}}, "soc": {"key": "Social Sciences & Policy", "color": "#f5c842", "emoji": "🏛️", "summary": "Social sciences are only 6.1% of serious published HS research despite being a heavily written-about area. Most students are stuck at the commentary level. Every social science project must have a hypothesis tested with a statistical method — survey plus regression is the winning formula.", "rigor": "Published social science papers all have: a falsifiable hypothesis, a named data source (survey, government records, or platform data), and at least one inferential statistical test reported with effect size and p-value. The benchmark is: original dataset, regression, clear policy framing.", "unexplored": [{"t": "Recommendation algorithm effects on political polarisation in non-US social media contexts", "w": "India, Brazil, and Indonesia are severely under-studied"}, {"t": "Mental health outcomes of JEE and NEET exam students across Indian states", "w": "Massive population, high relevance, no rigorous published HS study exists"}, {"t": "Caste-based digital divide in rural India using NSSO data", "w": "Equity plus technology plus policy — highly original at HS level"}, {"t": "Teacher burnout rates and student outcome correlations using NCES district data", "w": "Education policy with freely available federal data"}, {"t": "Food access mapping and obesity rates using census and health records", "w": "GIS plus public health plus social policy — three disciplines in one"}, {"t": "Social media misinformation spread velocity during state elections", "w": "Timely, platform API data available, clear methodology"}], "sop": {"first_meeting": ["The first and only agenda item: convert the student's topic into a falsifiable hypothesis. 'Social media is bad' becomes 'Higher daily screen time correlates with lower self-reported wellbeing scores among 15–17 year olds.' Do not leave the meeting without this sentence written down.", "Identify the data source together. Walk through: school survey (fast, free, needs ethics clearance), government open data (Census, NCES, FBI UCR, India NFHS), or platform API. Each has different timelines and constraints.", "Assess statistics comfort level. Can the student compute a correlation and interpret a p-value? If not, assign a Khan Academy statistics module as mandatory pre-work before the next meeting.", "Warn about political topics early: papers on contested political subjects face higher scrutiny. If the student insists on a politically sensitive topic, the methodology must be bulletproof.", "Assign: find the data source, download a sample, and describe in 3 sentences what the key variables are and how they are measured."], "thirty_day": ["Dataset acquired and key variables coded. If running a survey, data collection should be at least 50% complete with a minimum of 50 responses in hand.", "Hypothesis still holds given the actual data. Many projects need to be reframed at this stage when the expected relationship is not visible — that is fine, but catch it now not at submission.", "At least one statistical test run, even if preliminary. Review the output together and check that the student can interpret it correctly.", "Literature review: 6+ cited academic sources. Reject any paper that cites only news articles, blogs, or Wikipedia as primary evidence.", "Ethics check: if human subjects are involved, confirm that the survey is anonymous, consent is documented, and school approval is in place."], "go_nogo": ["GO: Falsifiable hypothesis, named data source with at least 50 data points already in hand, student can run a correlation or chi-square in Python/R/SPSS.", "GO: Policy recommendation is clearly articulable — the paper will tell a named institution or policymaker something actionable.", "NO-GO: Paper is structured as 'here are several perspectives on X' — this is an essay, not a research paper. Send back for reframing.", "NO-GO: Survey data collected without documented ethics clearance or anonymisation. Do not proceed — this is a submission-blocking issue.", "NO-GO: Student has an opinion and is looking for data to confirm it rather than genuinely testing a hypothesis. This is confirmation bias and will be visible to reviewers."]}}, "econ": {"key": "Economics & Finance", "color": "#60b4f4", "emoji": "📊", "summary": "Economics is only 3% of serious published HS research despite being a heavily written-about area. Most students write policy commentary rather than economic analysis. The bar requires actual econometric modelling — regression tables, identified causal mechanisms, and publicly cited data sources.", "rigor": "Published economics papers show: OLS or logistic regression with coefficient tables, World Bank, IMF, FRED, or RBI data sources, and a clear identification strategy separating correlation from causation. Empirical papers with clear policy implications get accepted.", "unexplored": [{"t": "Gig economy income volatility and financial stress in Indian platform workers", "w": "Rich behavioural data available, no HS economics treatment exists"}, {"t": "ML-based prediction of IMF structural adjustment programme outcomes", "w": "Finance plus AI — publishable with strong methodology"}, {"t": "Effect of UPI and fintech adoption on financial inclusion in rural India", "w": "Local plus macro data available from RBI and NPCI"}, {"t": "Returns to education by gender across South and Southeast Asian countries", "w": "Cross-national, World Bank data available, clear policy angle"}, {"t": "Carbon pricing mechanisms and industry-level employment effects using panel data", "w": "Environmental economics gap at HS level — no published paper exists"}, {"t": "Behavioural economics of vaccine hesitancy in specific demographic communities", "w": "Policy-relevant, survey data accessible, experimental design possible"}], "sop": {"first_meeting": ["Establish the causal question immediately. Ask: 'What is the effect of X on Y, and why do you believe it is causal rather than just correlated?' If the student cannot answer, the project is not ready.", "Open FRED, World Bank Open Data, and IMF WEO together and show the student how to download a panel or time-series dataset. The project should be grounded in data that exists right now.", "Assess whether the student knows what a regression is. If not, assign a 1-week primer: any introductory econometrics chapter on OLS. This is non-negotiable for serious economics research publication.", "Steer away from stock market prediction papers immediately. They are the most saturated and most sceptically reviewed topic in HS economics journals.", "Assign: download a dataset, compute summary statistics (mean, standard deviation, min, max for key variables), and write one paragraph describing what the data shows."], "thirty_day": ["Dataset cleaned and panel or cross-section structure confirmed. Student should be able to describe the unit of observation (country, firm, individual) and time period.", "At least one OLS regression run with output table. Review together: are the signs of coefficients in the expected direction? Are standard errors clustered appropriately?", "Identification strategy articulated: why does the student believe the relationship they are estimating is not purely confounded? Even a simple argument is better than none.", "Literature review: 5+ cited economics papers from real academic journals (AER, JEP, JPE, or working papers from NBER/SSRN). Blog posts and news articles are insufficient as primary citations.", "For the proof-based track: a formal conjecture or theorem statement should be drafted by day 30. If the student is not at this stage, this pathway is unlikely."], "go_nogo": ["GO: Causal question stated, relevant dataset downloaded, OLS regression producing output with correctly interpreted coefficients.", "GO: Student can articulate the identification strategy — even a simple 'I control for X, Y, Z' argument is sufficient at this stage.", "NO-GO: Paper is a descriptive comparison of GDP across countries with no regression or hypothesis test. This is a report, not research.", "NO-GO: Student wants to predict stock returns using past prices. Reviewers are extremely sceptical of data-mined backtests — steer away.", "NO-GO: No data source identified after 30 days. Economics papers without data are opinion pieces. Do not proceed to writing."]}}, "math": {"key": "Mathematics & Statistics", "color": "#c084fc", "emoji": "∑", "summary": "Mathematics is 12.8% of serious published HS research and the vast majority involves formal proof-based work with university co-authorship. This is the clearest structured pipeline: strong math student plus university co-author equals realistic publication. Graph theory, combinatorics, and applied statistics are the most published sub-fields.", "rigor": "Formal proof-based papers require: a stated theorem or conjecture, a complete proof, and placement within existing mathematical literature. Applied statistics papers (sports analytics, astrophysics) need a dataset and regression with domain expertise. No simulations or surveys belong in the pure math track.", "unexplored": [{"t": "Topological data analysis applied to social or biological network structures", "w": "Bridges pure math and data science — rising in graduate literature"}, {"t": "Combinatorial game theory in adversarial machine learning settings", "w": "Novel, publishable in both math and CS venues, no HS treatment"}, {"t": "Random graph models for epidemic spreading with heterogeneous populations", "w": "Post-COVID, high relevance, tractable for strong HS mathematicians"}, {"t": "Extremal graph theory: new bounds on Ramsey or Turán-type problems", "w": "Clean conjecture space, active research area, proof-track appropriate"}, {"t": "Geometry of high-dimensional data manifolds — proofs of specific properties", "w": "Emerging ML theory topic with almost no HS mathematical treatment"}, {"t": "Number theory applied to cryptographic protocol security proofs", "w": "Bridges pure mathematics and applied computer security"}], "sop": {"first_meeting": ["Assess the student's mathematical maturity first. Can they write a proof by induction and understand what a formal statement means? If not, the proof-based publication path is not appropriate yet.", "Identify the sub-field of interest: combinatorics, graph theory, number theory, geometry, or applied statistics. The student should be able to name at least three theorems they find interesting in that area.", "For the proof-based track: find one open problem or conjecture in the student's area of interest, ideally from a recent arXiv paper or the 'open problems' section of a textbook. This becomes the project seed.", "For the applied stats track: identify a domain the student is passionate about (sports, music, astronomy) and a publicly available dataset. The mathematical question should come from genuine curiosity about the domain.", "Assign: find one recently published formal mathematics proof paper in their area of interest and describe its main theorem and proof strategy in plain language."], "thirty_day": ["Proof-based track: student should have a precisely stated conjecture or theorem — not a vague direction. The statement should be falsifiable and novel with respect to the literature they have read.", "Proof-based track: first proof attempt drafted, even if incomplete. Productive failure is essential at this stage. Identify where the argument breaks down.", "Faculty co-author contact: at least 5 cold emails sent to relevant university mathematicians, with a specific one-paragraph description of the problem the student is working on. Track responses.", "Applied stats track: dataset cleaned, at least one visualisation produced, and regression model specified with dependent and independent variables clearly labelled.", "LaTeX setup: every math student should be writing in LaTeX by day 30. This is mandatory for proof-based mathematics publication and expected at all serious math venues."], "go_nogo": ["GO (Proof track): Student has a precisely stated novel conjecture, has read the relevant literature, and has a partial proof or strong intuition for why the result is true.", "GO (Proof track): University co-author identified and has agreed to supervise the work, even informally.", "GO (Applied Stats): Dataset in hand, regression specified, student can interpret output correctly.", "NO-GO: Student wants to 'explore' an area of mathematics without a specific theorem to prove. Exploration is pre-research, not a paper.", "NO-GO: No faculty co-author after 60 days of outreach. Proof-based publication without institutional co-authorship is very rarely successful. Pivot to the applied statistics track instead."]}}, "hum": {"key": "Humanities & History", "color": "#fb923c", "emoji": "📜", "summary": "Humanities is 6.7% of serious published HS research. The critical insight: successful papers are NOT traditional essays. They are empirical or quantitative analyses of humanistic questions. Computational linguistics, survey-based ethics studies, and sports analytics are what actually get published.", "rigor": "Published papers have: survey data with statistical analysis, text corpus analysis with quantitative output, or behavioural data with regression. The benchmark papers combine empirical survey methods with ethical or cultural frameworks, and are co-authored with university faculty.", "unexplored": [{"t": "Sentiment analysis of colonial-era newspaper coverage of independence movements", "w": "Computational history using digitised newspaper archives — no HS paper exists"}, {"t": "Code-switching frequency in multilingual South Asian diaspora families", "w": "Linguistics fieldwork, culturally specific, highly original at HS level"}, {"t": "Detection accuracy of AI-generated student essays by demographic group", "w": "Timely, educational ethics framing, experiment designable in school"}, {"t": "Social media archiving and the historical memory of recent political events", "w": "Digital humanities emerging field, no HS treatment yet"}, {"t": "Moral reasoning frameworks across cultures: survey comparison study", "w": "Philosophy meets cross-cultural psychology, IRB-approvable survey design"}, {"t": "Vocabulary change velocity in digital versus print media corpora over 20 years", "w": "Computational linguistics with Project Gutenberg and social media data"}], "sop": {"first_meeting": ["Reframe the humanities question as an empirical one together. Take whatever topic the student arrives with and ask: 'What would we measure to answer this, and where would we find that measurement?' Do not accept a purely interpretive framing.", "Identify the data or corpus. For literature and language: Voyant Tools, NLTK, or AntConc work on Project Gutenberg texts for free. For ethics and philosophy: design a short survey instrument that tests how people actually reason, not how they should.", "Assess whether the student can use basic text analysis tools or survey software (Google Forms plus spreadsheet analysis). If not, a short tutorial session is needed before the project begins.", "Find a faculty mentor in linguistics, philosophy, history, or cognitive science. Humanities professors are often more accessible than STEM faculty and underutilised as HS research mentors.", "Assign: find one recently published empirical humanities paper, describe its methodology in one paragraph, and draft one measurable research question using the same approach applied to a different topic."], "thirty_day": ["Corpus downloaded or survey instrument finalised. If corpus-based: at least one word frequency or sentiment analysis run and visualised. If survey: pilot with 10 people completed and instrument refined.", "Theoretical framework identified: what existing body of academic work does this paper speak to? The student should be able to name the field (corpus linguistics, moral psychology, digital humanities) and 3 key scholars.", "Faculty mentor contacted and responded. Even a brief email exchange counts. If no response after 10 attempts, shift to a purely data-based approach that does not require domain expert validation.", "Research question refined to be answerable: not 'How did colonialism affect literature?' but 'Do post-colonial Indian novels published 1947–1970 show measurably higher frequency of agency-related language compared to 1920–1946?'", "Statistical method selected: corpus frequency comparison, chi-square, t-test, or regression. The student should understand why this test is appropriate for their question."], "go_nogo": ["GO: Measurable research question stated, data source or corpus identified and accessible, student has produced at least one quantitative output from the data.", "GO: Paper is framed as testing or measuring something, not arguing for a position.", "NO-GO: Paper is structured as a traditional five-paragraph essay with no data. This will not be accepted by any serious research publication. Reframe the project around measurable data or redirect.", "NO-GO: Corpus or survey data collected but no statistical analysis planned. Description of data is not a paper — the analysis is the paper.", "NO-GO: Topic is so politically contested (religion, partition, caste) that any finding will be perceived as advocacy rather than research. Proceed only with exceptionally rigorous methodology and a very experienced mentor."]}}, "neuro": {"key": "Neuroscience & Psychology", "color": "#4ade80", "emoji": "🧠", "summary": "Only 1.8% of serious published HS research — one of the most underserved disciplines. A student with even a basic IRB-approvable experiment has almost no competition. The planarian memory paper is proof that an affordable, creative experiment design can produce genuinely publishable results.", "rigor": "Published papers in this discipline all have actual experimental data: a controlled behavioural experiment, a cognitive comparison test, or a survey with a validated psychological instrument and statistical analysis. Pure literature reviews do not get through peer review.", "unexplored": [{"t": "EEG-based attention tracking during online versus in-person learning", "w": "Consumer EEG devices (Muse headband) make this accessible without specialist lab"}, {"t": "Social media use and body image dissatisfaction in non-Western adolescents", "w": "Survey study, culturally specific, high relevance, large existing literature to build on"}, {"t": "Bilingualism and working memory capacity in teenagers: an experimental study", "w": "Cognitive testing study, accessible standardised tasks, university psych lab collaboration"}, {"t": "Music training and executive function development in primary school children", "w": "Longitudinal correlational study, school partnership needed, strong fit for serious HS journals"}, {"t": "Sleep deprivation patterns and risk-taking in competitive exam students in India", "w": "Indian context, exam culture relevance, survey-based with validated instruments"}, {"t": "Gratitude journal interventions and academic anxiety: a randomised pilot study", "w": "IRB-approvable school-based intervention, no HS paper exists in this exact framing"}], "sop": {"first_meeting": ["Establish the study design category: correlational (survey), quasi-experimental (pre-post), or experimental (randomised). Every psychology paper needs to state its design type in the methods section. Decide this in the first meeting.", "Identify the psychological construct being measured and the validated instrument for it. Stress: PSS-10. Anxiety: GAD-7. Working memory: digit span or N-back. Using a validated instrument signals methodological maturity immediately.", "For school-based studies: explain the ethics clearance pathway. Anonymous surveys with no identifiers are typically ethics-exempt. Anything involving deception or sensitive topics needs school counsellor or IRB sign-off.", "Explore animal model options if the student is biology-inclined: planaria regeneration memory, C. elegans chemotaxis, or Drosophila behaviour are all affordable, biosafe, and produce novel publishable results.", "Assign: read two published HS-level experimental psychology papers in full. Describe the study design, sample, instruments, and statistical tests used in each."], "thirty_day": ["Study design finalised: sample size estimated (minimum 30 for survey, minimum 10 per condition for experiments), recruitment method confirmed, instruments selected.", "Ethics clearance obtained or confirmed exempt. Do not proceed to data collection without this — it is a submission-blocking issue.", "For experimental or animal model work: pilot run completed, protocol documented, any equipment or reagent sourcing completed.", "University collaborator contacted. Psychology departments often welcome HS partnerships — target faculty who study adolescent development, cognitive neuroscience, or clinical psychology.", "Hypotheses pre-registered if possible (OSF Registries is free). Pre-registration signals rigour and protects against accusations of p-hacking."], "go_nogo": ["GO: Study design specified, validated instrument selected, ethics clearance confirmed, sample size meets minimum threshold.", "GO: For animal models — biosafe species confirmed, protocol approved by school science department, mentor identified.", "NO-GO: Student wants to study a psychological topic by reviewing existing literature only. Serious HS research journals will not accept this. Redirect to experimental or survey design.", "NO-GO: Survey planned but no validated instrument selected — self-invented rating scales without reliability testing are a common rejection reason.", "NO-GO: Sample size below 30 for survey studies. Underpowered studies cannot support inferential statistics. Either increase the sample or redesign as a pilot with descriptive analysis only."]}}, "chem": {"key": "Chemistry & Biology", "color": "#f472b6", "emoji": "⚗️", "summary": "Chemistry and Biology accounts for 4.9% of serious published HS research. Lab access is the non-negotiable requirement — virtually every published paper involves actual wet lab or experimental work. Even one day of access to a university chemistry or biology lab can produce publishable results if the experiment is well-scoped.", "rigor": "Published papers require: minimum 3 experimental replicates, a control condition, appropriate analytical methods (UV-Vis spectroscopy, HPLC, gel electrophoresis, or equivalent), and statistical comparison of conditions. Computational biology papers using AlphaFold or molecular docking are the alternative track.", "unexplored": [{"t": "Biodegradation kinetics of common agricultural plastics in Indian soil conditions", "w": "Local lab experiment with strong policy relevance, no HS paper from India"}, {"t": "Phytoremediation potential of native Indian plant species for heavy metal contamination", "w": "Environmental chemistry with locally sourced plant materials, accessible lab"}, {"t": "Antimicrobial properties of Ayurvedic plant extracts using disk diffusion assay", "w": "Cultural framing plus scientific validation, basic microbiology lab accessible"}, {"t": "CRISPR guide RNA efficiency prediction across genomic targets using ML", "w": "Computational biology, no wet lab needed, AlphaFold-adjacent topic"}, {"t": "Fermentation optimisation of idli or similar fermented foods", "w": "Food science plus microbiology, accessible lab setup, culturally grounded"}, {"t": "Photocatalytic degradation of textile dye wastewater using TiO2 variants", "w": "India-relevant, spectroscopy-based, replicates a proven published HS chemistry paper format"}], "sop": {"first_meeting": ["Lab access is the first and most important question. Ask: 'Do you have confirmed access to a lab with the equipment this experiment requires?' Do not let the student pick a topic before answering this.", "If no lab access: pivot immediately to computational biology. Open ColabFold or AlphaFold together and show the student how to submit a protein sequence. Molecular docking with AutoDock Vina is free and web-accessible.", "For wet lab projects: identify the specific analytical instrument needed (UV-Vis spectrophotometer, PCR machine, gel electrophoresis rig) and confirm it is available at the identified lab before any other scoping.", "Help the student frame the experiment around sustainability or green chemistry if possible. This framing consistently resonates with reviewers in this discipline.", "Assign: read two published HS-level experimental chemistry papers in full (catalyst studies or biopolymer synthesis work are good benchmarks). Write a one-page protocol outline following the same structure."], "thirty_day": ["Lab access confirmed in writing. Protocol approved by lab mentor. Safety assessment completed for any hazardous reagents.", "Pilot run completed: at least one full experimental cycle run to identify protocol issues before committing to full data collection.", "Replication plan confirmed: minimum 3 independent replicates per condition. Anything fewer cannot support statistical comparison.", "For computational biology track: protein target identified, AlphaFold or docking run completed for at least one ligand-receptor pair, visualisation produced.", "Materials and reagents sourced or confirmed available. Reagent shortages are a common timeline killer — order early."], "go_nogo": ["GO: Lab access confirmed in writing, protocol approved by mentor, pilot run shows the experiment is technically feasible.", "GO: For computational track — protein target identified, tool access confirmed, student can interpret docking scores or structure outputs.", "NO-GO: Lab access promised verbally but not confirmed in writing. Do not begin scoping — verbal promises from busy faculty collapse.", "NO-GO: Experiment designed around equipment that is unavailable at the identified lab. Either redesign the experiment or find a different lab.", "NO-GO: Fewer than 3 replicates per condition planned. This is a methodological floor that reviewers will flag immediately."]}}, "cs": {"key": "Computer Science & Software", "color": "#60b4f4", "emoji": "💻", "summary": "CS is severely underrepresented in serious published HS research. Most CS students build applications rather than conduct computer science research. Students who pivot from building to rigorously evaluating have almost zero competition. The template: a clearly scoped empirical comparison with well-defined metrics.", "rigor": "A publishable CS paper shows: multiple conditions (e.g. three algorithms), a clearly defined independent variable, well-measured dependent variables, and clean quantitative results. The paper answers a specific question completely. Reproducibility — public code and data — is expected by reviewers.", "unexplored": [{"t": "Adversarial robustness of medical image classification models under perturbation attacks", "w": "CS plus biomedical — clear empirical framing, no HS paper exists"}, {"t": "Graph-based link prediction in academic citation networks", "w": "Network science, open dataset available (DBLP, Semantic Scholar API), no HS CS paper"}, {"t": "Formal verification of security properties in commonly used smart contracts", "w": "CS theory plus blockchain, original verification methodology"}, {"t": "Differential privacy trade-offs in federated learning for student performance prediction", "w": "Privacy plus ML plus education policy — three-way interdisciplinary"}, {"t": "Energy consumption benchmarking of LLM inference across different hardware", "w": "Green CS framing, measurable experiment, no HS paper exists yet"}, {"t": "Vulnerability analysis of popular open-source cryptographic Python libraries", "w": "Security CS, empirical static analysis, accessible with free tools"}], "sop": {"first_meeting": ["Reframe the student's existing project as an empirical study. If they have built something, ask: 'What question does this answer, and how would you measure whether it answers it better than the alternatives?' The pivot from builder to researcher is the critical mindset shift.", "Identify the comparison conditions. Every publishable CS paper compares something: algorithms, models, architectures, configurations, or implementations. Ask the student: 'What are you comparing, and what would it mean to win?'", "Assess whether the student knows how to write a benchmark: fixed input set, controlled environment, repeated trials, averaged results. This is the core methodology for empirical CS.", "For CS theory papers targeting the proof/theory track: same pathway as mathematics — a specific algorithmic problem, a complexity result or algorithm design, and a university co-author.", "Assign: find a published HS-level empirical CS benchmarking paper and write a one-page description of how the same methodology could be applied to a different comparison question."], "thirty_day": ["Comparison conditions defined and justified. The student should be able to explain in one sentence why these specific conditions were chosen and why others were excluded.", "Benchmark harness built and running. At minimum: the experimental code runs, produces output, and results can be logged across conditions.", "At least one preliminary result in hand. Review together: is the result surprising? Does it answer the research question? Does it raise new questions?", "Code repository created on GitHub, structured cleanly, and documented. Reproducibility is expected by reviewers — a public repo is a strong positive signal.", "Related work section drafted: student should be able to describe 3 prior papers that do similar comparisons and explain precisely what is different about their study."], "go_nogo": ["GO: Clear comparison conditions defined, benchmark methodology specified, at least one condition producing reproducible results.", "GO: Research question is answerable — the paper will produce a clear quantitative result that either confirms or refutes a hypothesis.", "NO-GO: Student has built an application and wants to 'write it up' as a paper. A description of a tool is a product demo, not a research paper. Reframe around evaluation or reject.", "NO-GO: Benchmark conditions are not controlled — if external factors (network, background processes, hardware variation) are not controlled, the results are not comparable.", "NO-GO: No baseline or comparison condition. A study that measures only one implementation of anything cannot produce a comparative result."]}}, "phys": {"key": "Physics & Engineering", "color": "#a3e635", "emoji": "⚡", "summary": "Physics and Engineering has the fewest papers in serious published HS research — the single largest opportunity gap. Students in robotics, propulsion, aerospace, or materials science face almost zero competition. The barrier is not quality — it is that almost no one is trying.", "rigor": "Strong published papers are focused comparative analyses: thermodynamic performance comparisons, simplified simulations with rigorous validation, or materials testing with clear performance metrics. The scope is very specific — one geometry, one parameter, one comparison — with an honest and detailed limitations section.", "unexplored": [{"t": "Structural integrity simulation of 3D-printed aerospace components under load", "w": "FEA in Fusion 360 or Ansys Student — accessible, no physical lab needed"}, {"t": "Piezoelectric energy harvesting from building vibration in high-traffic areas", "w": "Materials science plus clean energy — experimental design is affordable"}, {"t": "Acoustic metamaterial design for urban noise reduction: a simulation study", "w": "Physics plus urban planning — genuinely novel at HS level"}, {"t": "Bio-inspired soft robotics: pneumatic actuator design for adaptive locomotion", "w": "Rapidly growing field, accessible materials, strong design component"}, {"t": "Satellite drag modelling for low Earth orbit constellation management", "w": "Astrophysics plus orbital mechanics, simulation-based, open data available"}, {"t": "Thermal runaway propagation in lithium-ion battery packs: a modelling study", "w": "EV safety, computational approach, no HS paper exists in this framing"}], "sop": {"first_meeting": ["Scope ruthlessly. Physics and engineering papers fail almost exclusively because they are too broad. The question must be so specific that the student can draw the experimental setup or simulation boundary on a single sheet of paper.", "Identify whether the project is experimental, simulation-based, or analytical. Each has completely different resource requirements. Confirm availability before any further ideation.", "For simulation-based projects: set up the student with Ansys Student (free), MATLAB (school licence), Fusion 360 (free for students), or OpenFOAM (free and open source) in the first meeting. Simulation tool access is the bottleneck.", "Find a university engineering department collaborator. Mechanical, aerospace, electrical, and materials engineering faculty are significantly less inundated with HS research requests than biology or CS faculty — cold email success rates are higher.", "Assign: find two published HS-level engineering or applied physics papers. Describe the scope of each: what exactly was compared, measured, or simulated, and what the clearly defined performance metric was."], "thirty_day": ["Simulation tool installed and running with at least one test case completed. Student should be able to produce a basic output (stress plot, temperature map, or trajectory) from a simplified version of their problem.", "Physical parameters of the system defined: geometry, material properties, boundary conditions, and loading scenarios. These must be explicitly stated before any serious simulation begins.", "University engineering mentor contacted and ideally responded. If no response after 15 emails, help the student identify a local professional engineer (from industry) who could serve as a technical adviser.", "Related work identified: at least 3 papers in the same engineering sub-domain reviewed and summarised. The student must know what has been simulated or tested before and what gap they fill.", "Performance metric defined: what is the dependent variable? Efficiency, strength, temperature, drag, noise level? The metric must be measurable and comparable across conditions."], "go_nogo": ["GO: Specific engineering question with named geometry, material, and performance metric. Simulation tool installed and test case running.", "GO: Comparison conditions defined — at least two configurations, geometries, or materials being compared on the same metric.", "NO-GO: Project framed as 'how does X work' — this is a textbook explanation, not a research paper. Redirect to 'which configuration of X performs best on metric Y under conditions Z.'", "NO-GO: Simulation proposed but tool not yet installed or validated. Do not let the student commit to a simulation-heavy timeline without confirmed software access.", "NO-GO: No university or professional engineering mentor identified after 30 days. Physics and engineering papers without technical review from a domain expert almost always fail peer review."]}}}</script>
<script type="application/json" id="d-stars">{"ai": [{"name": "MIT CSAIL — Computational Biology Group", "focus": "ML models for clinical prediction, genomic sequence analysis, drug target discovery", "why": "Their work on applying transformers to biological sequences defines what rigorous AI+bio papers look like. Study their evaluation frameworks.", "link": "https://www.csail.mit.edu"}, {"name": "Stanford HAI — Human-Centered AI Institute", "focus": "Fairness, accountability, and robustness in deployed ML systems", "why": "Their bias auditing and evaluation frameworks are exactly the kind of socially grounded AI research that stands out at the HS level.", "link": "https://hai.stanford.edu"}, {"name": "DeepMind Safety Team — Open Research", "focus": "Alignment, interpretability, and evaluation of large language models", "why": "Their evaluation methodology papers are accessible and show how to rigorously benchmark AI systems — the gold standard for methods sections.", "link": "https://deepmind.google/research/"}], "bio": [{"name": "Broad Institute — Cancer Program", "focus": "Pan-cancer genomics, CRISPR screens, single-cell sequencing", "why": "Their pan-cancer Atlas work is directly reproducible at HS level using public TCGA data. Many publishable student projects have started by replicating a Broad methodology on a different cancer type.", "link": "https://www.broadinstitute.org/cancer"}, {"name": "Johns Hopkins Bloomberg School of Public Health", "focus": "Social determinants of health, maternal mortality, population health disparities", "why": "Their framing of health equity questions — specific population, specific policy, specific data source — is the template for publishable HS health science papers.", "link": "https://publichealth.jhu.edu"}, {"name": "Wellcome Sanger Institute — Open Targets", "focus": "Target identification, drug repurposing, genetic disease mechanisms", "why": "Fully open datasets and reproducible computational pipelines. A student who can run one of their existing notebooks on a new disease target has a paper.", "link": "https://www.opentargets.org"}], "env": [{"name": "NASA Goddard Space Flight Center — Climate Science", "focus": "Urban heat islands, land surface temperature, global climate monitoring", "why": "Their satellite datasets (Landsat, MODIS) are publicly available and multiple published HS papers have used them. The NASA Goddard co-authorship pattern is proven and replicable.", "link": "https://www.nasa.gov/goddard"}, {"name": "NCAR — National Center for Atmospheric Research", "focus": "Climate modelling, drought prediction, atmospheric chemistry", "why": "Open climate model outputs (CESM, WRF) that students can use for regional analysis without running the model themselves. Ideal for computational climate papers.", "link": "https://ncar.ucar.edu"}, {"name": "ETH Zurich — Environmental Systems Science", "focus": "Circular economy, carbon accounting, sustainable materials", "why": "Their LCA (life cycle assessment) methodology papers define the rigor standard for sustainability research. Their open datasets are globally referenced.", "link": "https://usys.ethz.ch"}], "soc": [{"name": "Harvard Kennedy School — Evidence for Policy Design", "focus": "Randomised evaluations, behavioural interventions, education policy", "why": "Their evidence-based policy research framework is the template for how social science papers should be structured — hypothesis, data, test, policy implication.", "link": "https://epod.cid.harvard.edu"}, {"name": "MIT Media Lab — Social Machines Group", "focus": "Digital sociology, platform dynamics, online behaviour", "why": "Their work on social media algorithm effects and misinformation spread are directly relevant to publishable HS social science topics — and they release datasets openly.", "link": "https://www.media.mit.edu"}, {"name": "Pew Research Center — Digital Life", "focus": "Adolescent technology use, social media and wellbeing, digital inequality", "why": "Their methodology reports are the best tutorial on how to design rigorous survey-based social science research. Study their questionnaire design before building your own.", "link": "https://www.pewresearch.org/internet"}], "econ": [{"name": "NBER — National Bureau of Economic Research", "focus": "Labour economics, health economics, development economics, macro", "why": "Free working papers, open data, and clear econometric methodology. The best HS economics papers cite NBER working papers as their literature foundation.", "link": "https://www.nber.org"}, {"name": "J-PAL — Abdul Latif Jameel Poverty Action Lab", "focus": "Randomised controlled trials in development economics, education, and health", "why": "Their framing of causal economic questions and their open policy summaries are the template for rigorous HS economics research — especially for India-focused topics.", "link": "https://www.povertyactionlab.org"}, {"name": "World Bank Development Research Group", "focus": "Trade, financial inclusion, labour markets, growth", "why": "Fully open micro-data and working papers. Students analysing World Bank datasets on India, Southeast Asia, or Africa are working with the same data as published economists.", "link": "https://www.worldbank.org/en/research"}], "math": [{"name": "MIT Mathematics Department — Combinatorics Group", "focus": "Algebraic combinatorics, graph theory, probabilistic methods", "why": "Their open lecture notes, problem sets, and arXiv preprints define the frontier in combinatorics. The open problems listed in their papers are the ideal source for student research questions.", "link": "https://math.mit.edu"}, {"name": "MSRI / SLMath — Berkeley", "focus": "Pure mathematics across all sub-fields, summer programs for young mathematicians", "why": "Their summer school notes and program materials are free and introduce students to active research areas with open problems clearly stated. An excellent source for project seeds.", "link": "https://www.slmath.org"}, {"name": "AIM — American Institute of Mathematics", "focus": "Open problems in number theory, graph theory, and algebra", "why": "Maintains a curated list of open mathematics problems specifically designed to be accessible to non-experts. This is one of the best starting points for a student looking for a provable conjecture.", "link": "https://aimath.org/openproblems.html"}], "hum": [{"name": "Stanford Literary Lab", "focus": "Computational approaches to literary history, large-scale text analysis", "why": "Their pamphlets are short, methodologically explicit, and directly show how to apply quantitative methods to humanistic questions. Every HS humanities researcher should read at least two.", "link": "https://litlab.stanford.edu"}, {"name": "Oxford Internet Institute", "focus": "Digital culture, online discourse, social media and democracy", "why": "Their open research on computational propaganda and platform effects is directly relevant to the most publishable HS humanities topics right now.", "link": "https://www.oii.ox.ac.uk"}, {"name": "UCLA Digital Humanities", "focus": "Cultural analytics, historical GIS, archival digitisation", "why": "Their digital humanities projects show how to turn historical or literary questions into data problems — the exact pivot needed for HS humanities papers to be publishable.", "link": "https://dh.ucla.edu"}], "neuro": [{"name": "Allen Institute for Brain Science", "focus": "Connectomics, cell type atlases, open neuroscience databases", "why": "Fully open datasets (Allen Brain Atlas) that students can analyse computationally without any lab access. A student who runs a novel analysis on their public data has a genuine research contribution.", "link": "https://alleninstitute.org/division/brain-science"}, {"name": "Harvard Conflict Neuroscience Lab", "focus": "Decision-making, moral cognition, social neuroscience", "why": "Their experimental paradigms for studying moral and social cognition are directly adaptable to IRB-approvable school studies. Study their methods for designing clean behavioural experiments.", "link": "https://www.joshua-greene.net"}, {"name": "OpenNeuro.org — NIMH Data Archive", "focus": "Open fMRI, EEG, and behavioural datasets", "why": "Hundreds of freely available neuroimaging and cognitive datasets. A student with Python skills can run a novel analysis on existing data — no lab, no participants needed.", "link": "https://openneuro.org"}], "chem": [{"name": "MIT Chemistry — Green Chemistry Initiative", "focus": "Sustainable synthesis, catalysis, waste reduction in chemical processes", "why": "Their green chemistry frameworks and sustainable catalyst work are directly reproducible at the HS lab level. The sustainability framing also resonates strongly with reviewers.", "link": "https://chemistry.mit.edu"}, {"name": "AlphaFold / DeepMind Structural Biology", "focus": "Protein structure prediction, drug target identification", "why": "ColabFold is free and web-based. A student who runs AlphaFold predictions on a novel protein target and connects the structure to a disease mechanism has a publishable computational biology paper.", "link": "https://alphafold.ebi.ac.uk"}, {"name": "IISER Pune — Chemistry and Biology Interface", "focus": "Medicinal plant chemistry, bio-inspired synthesis, environmental chemistry", "why": "One of the most accessible Indian research institutions for HS student collaboration. Their work on medicinal plants and local environmental chemistry is directly relevant and open to co-authorship.", "link": "https://www.iiserpune.ac.in/research/department/chemistry"}], "cs": [{"name": "Carnegie Mellon CyLab — Security & Privacy", "focus": "Cryptography, system security, privacy-preserving computation", "why": "Their open course materials and research papers define the rigour standard for empirical CS security research. The encryption benchmarking paper template comes directly from this tradition.", "link": "https://www.cylab.cmu.edu"}, {"name": "Berkeley RISE Lab", "focus": "Systems, distributed computing, real-time AI inference", "why": "Their benchmarking culture and open evaluation frameworks are the model for how to turn a CS engineering question into a publishable empirical paper.", "link": "https://rise.cs.berkeley.edu"}, {"name": "University of Toronto — Vector Institute", "focus": "Deep learning theory, AI safety, fairness in ML", "why": "Accessible to international students, frequently open to HS collaboration, and their work on ML evaluation and fairness is a rich source of unexplored topics.", "link": "https://vectorinstitute.ai"}], "phys": [{"name": "Caltech GALCIT — Aeronautics and Propulsion", "focus": "High-speed propulsion, fluid dynamics, rocket combustion", "why": "The published work on rotating detonation engines and novel combustor geometries is directly adjacent to what is being explored in HS engineering papers. Their open technical reports are excellent methodology guides.", "link": "https://galcit.caltech.edu"}, {"name": "MIT Media Lab — Tangible Media Group", "focus": "Soft robotics, programmable matter, wearable computing", "why": "One of the few elite labs whose work overlaps directly with experiments HS students can actually replicate. Their open-source robotics designs and materials research are designed to be accessible.", "link": "https://tangible.media.mit.edu"}, {"name": "ISRO Space Applications Centre — Remote Sensing", "focus": "Satellite design, remote sensing, atmospheric science", "why": "For Indian students especially, ISRO SAC publishes open satellite data and has active HS and undergrad outreach programmes. Collaboration is more accessible than most Western aerospace labs.", "link": "https://www.sac.gov.in"}]}</script>

<script>
/* All snapshots are baked in at build time. No localStorage writes needed for data.
   Active snapshot index is stored in localStorage only for UI state. */
var SNAPSHOTS = JSON.parse(document.getElementById('d-snapshots').textContent);
var M         = JSON.parse(document.getElementById('d-meta').textContent);
var S         = JSON.parse(document.getElementById('d-stars').textContent);

var COLORS = ['#c2956d','#7a9ec9','#6aad8e','#c07a7a','#a07ac2','#7abdc0','#c2a96d','#8ea07a','#c27a95','#7a8ec2','#c0b87a'];
var DISC_KEYS = {
  ai:'AI & Machine Learning',bio:'Biomedical & Health Sciences',
  env:'Environmental & Climate Science',soc:'Social Sciences & Policy',
  econ:'Economics & Finance',math:'Mathematics & Statistics',
  hum:'Humanities & History',neuro:'Neuroscience & Psychology',
  chem:'Chemistry & Biology',cs:'Computer Science & Software',
  phys:'Physics & Engineering'
};
var DISC_ORDER = ['ai','bio','env','soc','econ','math','hum','neuro','chem','cs','phys'];

function getActiveIdx(){
  var i = parseInt(localStorage.getItem('ri_snap')||'0');
  return Math.min(i, SNAPSHOTS.length-1);
}
function setActiveIdx(i){ try{localStorage.setItem('ri_snap',String(i));}catch(e){} }
var D = SNAPSHOTS[getActiveIdx()];

function updateSidebar(){
  DISC_ORDER.forEach(function(k){
    var el=document.getElementById('pct-'+k); if(!el)return;
    var v=D.disc_pct&&D.disc_pct[DISC_KEYS[k]];
    el.textContent=v!=null?(v<1?'<1%':Math.round(v)+'%'):'';
  });
  document.getElementById('hdr-snap').textContent  = D.snapshot_date  || '';
  document.getElementById('hdr-badge').textContent = D.snapshot_label || '';
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function bar(label,pct,col,wide){
  return '<div class="bar-row">'+
    '<div class="bar-label'+(wide?' wide':'')+'">'+esc(label)+'</div>'+
    '<div class="bar-track"><div class="bar-fill" style="width:'+Math.min(pct,100)+'%;background:'+col+'"></div></div>'+
    '<div class="bar-val">'+pct+'%</div></div>';
}
function papers(list,forPrint){
  if(!list||!list.length) return '<div class="callout callout-blue">No sample papers in this snapshot.</div>';
  return '<div class="papers-grid">'+list.slice(0,6).map(function(p){
    var aff=(p.affiliation&&p.affiliation!=='nan')
      ?'<div class="paper-affil">'+esc(p.affiliation.replace(/\(\d[\d,]*\)\s*/g,'').slice(0,90))+'</div>':'';
    var lnk='';
    if(p.link&&p.link.indexOf('http')===0){
      lnk=forPrint
        ?'<div class="paper-link">'+esc(p.link)+'</div>'
        :'<a class="paper-link" href="'+esc(p.link)+'" target="_blank">'+esc(p.link)+'</a>';
    }
    return '<div class="paper-card"><div class="paper-title">'+esc(p.title)+'</div>'+aff+
      '<div class="paper-abstract">'+esc(p.abstract||'')+'</div>'+lnk+'</div>';
  }).join('')+'</div>';
}
function topics(list){
  if(!list||!list.length) return '';
  return '<div class="topic-grid">'+list.map(function(t){
    return '<div class="topic-chip"><div class="t-title">'+esc(t.t)+'</div><div class="t-why">'+esc(t.w)+'</div></div>';
  }).join('')+'</div>';
}
function northStars(key,forPrint){
  var stars=S[key]; if(!stars||!stars.length) return '';
  return '<div class="ns-grid">'+stars.map(function(ns){
    var lnk=ns.link?(forPrint
      ?'<div class="ns-link">'+esc(ns.link)+'</div>'
      :'<a class="ns-link" href="'+esc(ns.link)+'" target="_blank">Explore research</a>'):'';
    return '<div class="ns-card"><div class="ns-name">'+esc(ns.name)+'</div>'+
      '<div class="ns-focus">'+esc(ns.focus)+'</div>'+
      '<div class="ns-divider"></div>'+
      '<div class="ns-why">'+esc(ns.why)+'</div>'+lnk+'</div>';
  }).join('')+'</div>';
}
function sopBlock(key,sop,forPrint){
  if(!sop) return '';
  var id='sop_'+key;
  function liItems(arr){return (arr||[]).map(function(s){return '<li>'+s+'</li>';}).join('');}
  function goItems(arr){
    return (arr||[]).map(function(s){
      var cls=(s.indexOf('GO:')==0||s.indexOf('GO (')==0)?'go':'nogo';
      return '<li class="'+cls+'">'+s+'</li>';
    }).join('');
  }
  if(forPrint){
    return '<div class="sop-wrap" style="overflow:visible">'+
      ['First Meeting','30-Day Check','Go / No-Go'].map(function(label,idx){
        var arr=idx===0?sop.first_meeting:idx===1?sop.thirty_day:sop.go_nogo;
        var cls=idx===2?'sop-gonogo':'';
        var items=idx===2?goItems(arr):liItems(arr);
        var bb=idx<2?'border-bottom:1px solid var(--border);':'';
        return '<div class="'+cls+'" style="background:var(--surface);padding:20px;'+bb+'">'+
          '<div style="font-family:var(--ff-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:14px">'+label+'</div>'+
          '<ol class="sop-list">'+items+'</ol></div>';
      }).join('')+'</div>';
  }
  return '<div class="sop-wrap">'+
    '<div class="sop-tabs">'+
      '<div class="sop-tab active" data-id="'+id+'" data-p="m" onclick="sopSwitch(this)">First Meeting</div>'+
      '<div class="sop-tab" data-id="'+id+'" data-p="t" onclick="sopSwitch(this)">30-Day Check</div>'+
      '<div class="sop-tab" data-id="'+id+'" data-p="g" onclick="sopSwitch(this)">Go / No-Go</div>'+
    '</div>'+
    '<div class="sop-panels">'+
      '<div id="'+id+'_m" class="sop-panel active"><ol class="sop-list">'+liItems(sop.first_meeting)+'</ol></div>'+
      '<div id="'+id+'_t" class="sop-panel"><ol class="sop-list">'+liItems(sop.thirty_day)+'</ol></div>'+
      '<div id="'+id+'_g" class="sop-panel sop-gonogo"><ol class="sop-list">'+goItems(sop.go_nogo)+'</ol></div>'+
    '</div></div>';
}
function sopSwitch(el){
  var base=el.dataset.id,panel=el.dataset.p;
  ['m','t','g'].forEach(function(p){var n=document.getElementById(base+'_'+p);if(n)n.classList.remove('active');});
  var t=document.getElementById(base+'_'+panel);if(t)t.classList.add('active');
  el.closest('.sop-wrap').querySelectorAll('.sop-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
}

/* ── REPORT BUILDER ── */
function buildReportHTML(){
  var theme=document.documentElement.getAttribute('data-theme')||'dark';
  var disc=D.disc_pct||{},meth=D.methods_pct||{},combo=D.interdis_combos_pct||{};
  var maxC=Math.max.apply(null,Object.values(combo).concat([1]));
  var discBarsH=Object.entries(disc).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];}).map(function(e,i){return bar(e[0],e[1],COLORS[i%COLORS.length],true);}).join('');
  var methBarsH=Object.entries(meth).sort(function(a,b){return b[1]-a[1];}).map(function(e,i){return bar(e[0],e[1],COLORS[(i+4)%COLORS.length],true);}).join('');
